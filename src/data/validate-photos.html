        flex-wrap: wrap;
      }
      .photo-item {
        position: relative;
        cursor: pointer;
        border-radius: 10px;
        border: 3px solid transparent;
        transition:

          transform 0.1s;
        flex-shrink: 0;
      }
      .photo-item:hover {
        transform: scale(1.03);
      }
      .photo-item.selected {
        border-color: #22c55e;
      }
      .photo-item.selected .check {
        opacity: 1;
        transform: scale(1);
      }
      .check {
        position: absolute;
        top: 6px;
        right: 6px;
        width: 26px;
        height: 26px;
        background: #22c55e;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        transform: scale(0.5);
        transition:
          opacity 0.15s,
          transform 0.15s;
        font-size: 14px;
        color: white;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
        z-index: 2;
      }
      .photo-item img {
        width: 140px;
        height: 175px;
        object-fit: cover;
        border-radius: 8px;
        display: block;
        background: #f8fafc;
      }
      .photo-item .info {
        width: 140px;
        padding: 5px 4px 2px;
        font-size: 0.68rem;
        color: #64748b;
        text-align: center;
        line-height: 1.3;
      }
      .http-status {
        font-size: 0.65rem;
        font-weight: 700;
      }
      .http-status.ok {
        color: #16a34a;
      }
      .http-status.fail {
        color: #dc2626;
      }
      .warning {
        font-size: 0.8rem;
        color: #b45309;
        background: #fffbeb;
        border: 1px solid #fde68a;
        border-radius: 8px;
        padding: 10px 12px;
        margin-bottom: 12px;
      }
      .incomplete {
        font-size: 0.8rem;
        color: #7c3aed;
        background: #f5f3ff;
        border: 1px solid #ddd6fe;
        border-radius: 8px;
        padding: 10px 12px;
        margin-bottom: 12px;
      }

      /* Barre flottante */
      #sticky-bar {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;

      // ── state ──
      const selected = {}; // { personId: Set<url> }
      data.forEach((p) => {
        selected[p.id] = new Set();
      });

      function getTotalSelected() {
        return Object.values(selected).reduce((s, set) => s + set.size, 0);
      }

      function updateBadge(personId) {
        const count = selected[personId].size;
        const badge = document.querySelector(`[data-badge="${personId}"]`);
        if (badge) {
          const allPhotos = data.find((p) => p.id === personId);
          const total = allPhotos.photos
            ? allPhotos.photos.length
            : (allPhotos.sections?.reduce((s, x) => s + x.photos.length, 0) ??
              0);
          badge.textContent = `${count} / ${total}`;
          badge.className = `badge ${count >= 3 ? "ok" : "warn"}`;
        }
        document.getElementById("total-count").textContent = getTotalSelected();
      }

      function togglePhoto(personId, url, itemEl) {
        if (selected[personId].has(url)) {
          selected[personId].delete(url);
          itemEl.classList.remove("selected");
        } else {
          selected[personId].add(url);
          itemEl.classList.add("selected");
        }
        updateBadge(personId);
      }

      // ── build UI ──
      const container = document.getElementById("container");

      function makeGrid(personId, photos) {
        const grid = document.createElement("div");
        grid.className = "photos";
        photos.forEach((c) => {
          const item = document.createElement("div");
          item.className = "photo-item";
          item.onclick = () => togglePhoto(personId, c.url, item);

          const check = document.createElement("div");
          check.className = "check";
          check.textContent = "✓";

          const img = document.createElement("img");
          img.loading = "lazy";
          img.alt = "";
          const statusEl = document.createElement("span");
          statusEl.className = "http-status";
          img.onload = () => {
            statusEl.className = "http-status ok";
            statusEl.textContent = "✅";
          };
          img.onerror = () => {
            statusEl.className = "http-status fail";
            statusEl.textContent = "❌ 404";
            item.style.opacity = ".4";
            item.style.pointerEvents = "none";
          };
          img.src = c.url;

          const info = document.createElement("div");
          info.className = "info";
          info.appendChild(statusEl);
          info.append(" " + c.label);

          item.append(check, img, info);
          grid.appendChild(item);
        });
        return grid;
      }

      data.forEach((person) => {
        const div = document.createElement("div");
        div.className = "person";

        const allPhotos = person.photos
          ? person.photos
          : (person.sections?.flatMap((s) => s.photos) ?? []);
        const total = allPhotos.length;

        div.innerHTML = `
    <div class="person-header">
      <h2>${person.name}</h2>
      <span class="badge warn" data-badge="${person.id}">0 / ${total}</span>
    </div>
    <div class="role">${person.role}</div>
  `;

        if (person.warning) {
          const w = document.createElement("div");
          w.className = "warning";
          w.textContent = person.warning;
          div.appendChild(w);
        }
        if (person.incomplete) {
          const w = document.createElement("div");
          w.className = "incomplete";
          w.textContent = "⚠️ " + person.incomplete;
          div.appendChild(w);
        }

        if (person.sections) {
          person.sections.forEach((s) => {
            const lbl = document.createElement("div");
            lbl.className = "section-label";
            lbl.textContent = s.label;
            div.appendChild(lbl);
            div.appendChild(makeGrid(person.id, s.photos));
          });
        } else {
          div.appendChild(makeGrid(person.id, person.photos));
        }

        container.appendChild(div);
      });

      // ── export ──
      function openModal() {
        const output = {};
        data.forEach((p) => {
          output[p.id] = Array.from(selected[p.id]);
        });
        document.getElementById("export-output").value = JSON.stringify(
          output,
          null,
          2,
        );
        document.getElementById("modal-overlay").classList.add("open");
      }
      function closeModal() {
        document.getElementById("modal-overlay").classList.remove("open");
      }
      function copyOutput() {
        const ta = document.getElementById("export-output");
        ta.select();
        document.execCommand("copy");
        const btn = document.querySelector(".copy-btn");
        btn.textContent = "✅ Copié !";
        setTimeout(() => (btn.textContent = "📋 Copier"), 1500);
      }
    </script>
  </body>
</html>
